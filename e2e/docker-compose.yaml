services:
  # ---------------------------------------------------------------------------
  # Gitea — lightweight Git server (SQLite, no external DB needed)
  # ---------------------------------------------------------------------------
  gitea:
    image: gitea/gitea:1.22
    container_name: e2e-gitea
    environment:
      # Use SQLite to avoid needing a separate database container
      - GITEA__database__DB_TYPE=sqlite3
      # Server
      - GITEA__server__ROOT_URL=http://gitea:3000
      - GITEA__server__HTTP_PORT=3000
      - GITEA__server__DOMAIN=gitea
      - GITEA__server__DISABLE_SSH=true
      # Skip the installation wizard
      - GITEA__security__INSTALL_LOCK=true
      # Disable public registration — users are created via CLI
      - GITEA__service__DISABLE_REGISTRATION=true
      - GITEA__service__REQUIRE_SIGNIN_VIEW=false
      # Allow webhooks to reach containers on the Docker network
      - GITEA__webhook__ALLOWED_HOST_LIST=*
      - GITEA__webhook__SKIP_TLS_VERIFY=true
    ports:
      - "${GITEA_HOST_PORT:-3000}:3000"
    volumes:
      - gitea_data:/data
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/v1/version"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s
    networks:
      - e2e

  # ---------------------------------------------------------------------------
  # Atlantis — PR automation server, custom image with our binary baked in
  # ---------------------------------------------------------------------------
  atlantis:
    build:
      context: .
      dockerfile: Dockerfile.atlantis
    container_name: e2e-atlantis
    # Load the Gitea API token generated by scripts/setup.sh
    env_file:
      - path: .env.secrets
        required: false
    environment:
      - ATLANTIS_ATLANTIS_URL=http://atlantis:4141
      - ATLANTIS_GITEA_BASE_URL=http://gitea:3000
      - ATLANTIS_GITEA_USER=${GITEA_ADMIN_USER:-e2e-admin}
      - ATLANTIS_GITEA_WEBHOOK_SECRET=${WEBHOOK_SECRET:-e2e-webhook-secret}
      - ATLANTIS_REPO_ALLOWLIST=*
      - ATLANTIS_REPO_CONFIG=/etc/atlantis/repos.yaml
      - ATLANTIS_LOG_LEVEL=${ATLANTIS_LOG_LEVEL:-info}
      - ATLANTIS_PORT=4141
    ports:
      - "${ATLANTIS_HOST_PORT:-4141}:4141"
    volumes:
      - ./repos.yaml:/etc/atlantis/repos.yaml:ro
    depends_on:
      gitea:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4141/healthz"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 15s
    networks:
      - e2e

networks:
  e2e:
    driver: bridge

volumes:
  gitea_data:
