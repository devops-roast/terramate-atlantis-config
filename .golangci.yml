version: "2"
run:
  modules-download-mode: readonly
linters:
  enable:
    - bodyclose
    - copyloopvar
    - durationcheck
    - gocritic
    - makezero
    - misspell
    - nilerr
    - noctx
    - predeclared
    - tparallel
    - unconvert
    - unparam
    - usetesting
    - wastedassign
  settings:
    gocritic:
      disabled-checks:
        - hugeParam
        - rangeValCopy
      enabled-tags:
        - diagnostic
        - style
        - performance
    misspell:
      locale: US
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gocritic
          - unparam
          - noctx
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/devops-roast/terramate-atlantis-config
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
